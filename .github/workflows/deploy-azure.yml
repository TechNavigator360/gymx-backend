name: Deploy GYMX Backend

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master

env:
  DATABASE_URL: ${{ vars.PRISMA_DATABASE_URL }}

jobs:
  build-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Build production Docker image
        run: docker build -t ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} .

      - name: Azure login
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure authentication
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: az account show

      - name: Login to Azure Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ vars.ACR_LOGIN_SERVER }} --username "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Push Docker image to Azure Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: docker push ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy image to Azure App Service
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          az webapp config container set \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --docker-custom-image-name ${{ vars.ACR_LOGIN_SERVER }}/${{ vars.IMAGE_NAME }}:${{ github.sha }} \
            --docker-registry-server-url https://${{ vars.ACR_LOGIN_SERVER }} \
            --docker-registry-server-user ${{ secrets.ACR_USERNAME }} \
            --docker-registry-server-password ${{ secrets.ACR_PASSWORD }}

          az webapp restart \
            --name ${{ vars.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }}

      - name: Wait for App Service restart
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: sleep 30

      - name: Validate deployed API with Newman
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npm run test:azure