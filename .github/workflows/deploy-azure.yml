name: Deploy GYMX Backend

on:
  push:
    branches:
      - master
      - feature/lu24-deployment

env:
  DATABASE_URL: ${{ vars.PRISMA_DATABASE_URL }}

jobs:
  build-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Build production Docker image
        run: docker build -t gymxregistry24015067.azurecr.io/gymx-backend:${{ github.sha }} .

      - name: Login to Azure Container Registry
        run: az acr login --name gymxregistry24015067

      - name: Push Docker image to Azure Container Registry
        run: docker push gymxregistry24015067.azurecr.io/gymx-backend:${{ github.sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Verify Azure authentication
        run: az account show
